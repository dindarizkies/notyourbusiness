<!doctype html>
<html lang="en">
  <head>

    <style>
    :root {
        --primary-color: #2563eb;
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
    }
    body {
        font-family: 'Inter', system-ui, sans-serif;
        background-color: var(--bg-color);
        color: #1e293b;
        line-height: 1.6;
        margin: 0;
        padding: 40px 20px;
    }
    .container {
        max-width: 800px;
        margin: 0 auto;
        background: var(--card-bg);
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
    h1 { color: var(--primary-color); border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
    .upload-section {
        background: #f1f5f9;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        border: 2px dashed #cbd5e1;
    }
    button {
        background-color: var(--primary-color);
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.3s;
        width: 100%;
    }
    button:hover { background-color: #1d4ed8; }
    input[type="file"] { margin: 10px 0; display: block; }
</style>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
