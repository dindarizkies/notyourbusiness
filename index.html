<!doctype html>
<html lang="en">
  <head>

    <style>
    :root {
        --primary: #4285f4; /* Warna Google Blue agar senada dengan logo */
        --primary-hover: #357abd;
        --bg: #f0f4f8;
        --card: #ffffff;
        --text: #1f2937;
        --text-light: #6b7280;
    }

    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 40px 20px;
        display: flex;
        justify-content: center;
    }

    .container {
        max-width: 900px;
        width: 100%;
        background: var(--card);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
    }

    /* Logo Styling */
    .header-logo {
        display: block;
        margin: 0 auto 20px;
        max-height: 50px;
        object-fit: contain;
    }

    .header-section {
        text-align: center;
        margin-bottom: 40px;
    }

    h1 {
        font-size: 2.2rem;
        font-weight: 800;
        margin-bottom: 10px;
        background: linear-gradient(to right, #4285f4, #34a853);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .subtitle {
        color: var(--text-light);
        font-size: 1.1rem;
    }

    /* Grid Layout untuk Upload & Panduan */
    .main-grid {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 30px;
    }

    .upload-card {
        background: #f8fafc;
        padding: 25px;
        border-radius: 20px;
        border: 2px dashed #e2e8f0;
        transition: all 0.3s ease;
    }

    .upload-card:hover {
        border-color: var(--primary);
        background: #f1f7ff;
    }

    .input-group {
        margin-bottom: 25px;
    }

    label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 0.95rem;
    }

    input[type="file"] {
        width: 100%;
        padding: 10px;
        background: white;
        border-radius: 10px;
        border: 1px solid #e2e8f0;
    }

    .btn-convert {
        background: var(--primary);
        color: white;
        border: none;
        padding: 16px 20px;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: transform 0.2s, background 0.3s;
    }

    .btn-convert:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
    }

    /* Card Panduan */
    .guide-card {
        background: #1e293b;
        color: #f1f5f9;
        padding: 25px;
        border-radius: 20px;
    }

    .guide-card h3 { color: #38bdf8; margin-top: 0; }

    .guide-list {
        padding-left: 20px;
        font-size: 0.9rem;
        line-height: 1.8;
    }

    /* Responsif untuk HP */
    @media (max-width: 768px) {
        .main-grid { grid-template-columns: 1fr; }
        .container { padding: 20px; }
    }
</style>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
<div class="container">
    <div class="header-section">
        <!-- Logo dari link Google Share kamu -->
        <img src="https://share.google/8xJ2LnCv2SARqB5Aa" alt="Logo" class="header-logo">
        <h1>Odoo x SOT Converter</h1>
        <p class="subtitle">Automasi cerdas untuk penggabungan data Excel Odoo & SOT.</p>
    </div>

    <div class="main-grid">
        <!-- Kotak Upload -->
        <div class="upload-card">
            <!-- Form input kamu di sini -->
            <button class="btn-convert">
                <span>🚀</span> Convert & Download
            </button>
        </div>

        <!-- Kotak Panduan -->
        <div class="guide-card">
            <h3>Panduan Cepat</h3>
            <ul class="guide-list">
                <li>Upload Template A (Odoo)</li>
                <li>Upload Template B (SOT)</li>
                <li>Klik Convert & tunggu AI bekerja</li>
            </ul>
        </div>
    </div>
</div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
